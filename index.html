<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary-blue: #0000CC;
            --soft-gray: #D4D0C8;
            --accent-red: #FF0000;
        }

        body {
            font-family: 'Verdana', 'Geneva', sans-serif;
            background-color: var(--soft-gray);
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
        }

        /* 導航欄 */
        header {
            background-color: #CCCCCC;
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h1 {
            margin: 0;
            color: var(--primary-blue);
            font-size: 24px;
        }

        .logo span {
            font-size: 14px;
            display: block;
            color: #666;
        }

        nav {
            display: flex;
            gap: 15px;
        }

        nav a img {
            transition: transform 0.2s, opacity 0.2s;
            height: 40px;
            width: auto;
        }

        nav a img:hover {
            transform: scale(1.05);
            opacity: 0.8;
        }

        /* 品牌滾動條 */
        .brands {
            background: white;
            padding: 10px 0;
            text-align: center;
            font-size: 12px;
            border-bottom: 1px solid #ccc;
        }

        .brands span { margin: 0 5px; }
        .color-blue { color: blue; }
        .color-red { color: red; }
        .color-green { color: green; }

        /* 主橫幅區 - 優化為網格排列 */
        .hero-banners {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 0;
            justify-items: center;
        }

        .hero-banners a {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .hero-banners img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }

        .hero-banners img:hover {
            transform: translateY(-5px);
        }

        /* 產品展示區 */
        .product-grid {
            display: grid;
            /* 調整 minmax 寬度以縮小圖示顯示面積 */
            grid-template-columns: repeat(auto-fit, minmax(65px, 1fr));
            gap: 15px;
            margin: 30px auto;
            max-width: 500px; /* 限制總寬度讓圖示保持細小排列 */
            justify-content: center;

        }

        .product-item {
            background: white;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            transition: 0.3s;
        }

        .product-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .product-item img {
            max-width: 100%;
            height: auto;
        }

        /* 簡易輪播圖容器 */
        .slideshow-container {
            max-width: 800px;
            position: relative;
            margin: 30px auto;
            background: #fff;
            padding: 10px;
            border: 5px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .mySlides {
            display: none;
            text-align: center;
        }

        .mySlides img {
            max-width: 100%;
            height: 400px;
            object-fit: contain;
        }

        /* 頁腳 */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #666;
            background: #eee;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; text-align: center; }
            nav { margin-top: 15px; }
            .mySlides img { height: 250px; }
            .hero-banners { grid-template-columns: 1fr; }
        }
    </style>
</head>

<script>
    let slideIndex = 0;
    showSlides();

    function showSlides() {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
        }
        slideIndex++;
        if (slideIndex > slides.length) {slideIndex = 1}    
        slides[slideIndex-1].style.display = "block";  
        setTimeout(showSlides, 3000);
    }
</script>
