<title>無標題文件</title>
<style type="text/css"> 
<!-- 
body  {
	font: 100% Verdana, Arial, Helvetica, sans-serif;
	background: #666666;
	margin: 0; /* 比較好的做法是將 Body 元素的邊界與欄位間隔調整為零，以處理不同的瀏覽器預設值 */
	padding: 0;
	text-align: center; /* 這樣會讓容器在 IE 5* 瀏覽器內置中對齊。然後，文字會在 #container 選取器中設定為靠左對齊預設值 */
	color: #000000;
}
.thrColLiqHdr #container { 
	width: 80%;  /* 這樣將會建立為 80% 瀏覽器寬度的容器 */
	background: #FFFFFF;
	margin: 0 auto; /* 自動邊界 (搭配寬度) 會讓頁面置中對齊 */
	border: 1px solid #000000;
	text-align: left; /* 這樣做會覆寫 Body 元素上的 text-align: center。 */
} 
.thrColLiqHdr #header { 
	background: #DDDDDD; 
	padding: 0 10px;  /* 這個欄位間隔符合下面顯示的 Div 中，元素的靠左對齊。如果在 #header 中使用影像而非文字，您可能會想要移除欄位間隔。 */
} 
.thrColLiqHdr #header h1 {
	margin: 0; /* 將 #header Div 中最後一個元素的邊界調整為零可避免邊界收合 (Div 之間出現的空間，無法解釋)。如果 Div 的周圍具有邊框，這就不是必要動作，因為該項設定也會避免邊界收合 */
	padding: 10px 0; /* 使用欄位間隔而非邊界便可讓元素遠離 Div 的邊緣 */
}

/* 邊列的提示：
1. 因為我們是以百分比為單位進行工作，所以最好不要在邊列上使用側邊欄位間隔。它將會新增至寬度，而讓符合標準的瀏覽器建立不明的實際寬度。 
2. 您可以根據在 ".thrColLiqHdr #sidebar1 p" 規則中看見的方式，將左和右邊界放置於 Div 內部的元素上，藉以建立 Div 側邊與內部元素之間的空間。
3. 因為 Explorer 會在呈現父元素之後計算寬度，所以您有時候會在百分比架構欄中遇到無法解釋的錯誤。如果您需要更多可預期的結果，便可以選擇變更為像素大小的欄。
*/
.thrColLiqHdr #sidebar1 {
	float: left; /* 在來源順序中，這個元素必須位於想要相鄰的任何元素前面 */
	width: 22%; /* 因為這個元素是浮動元素，所以您必須指定寬度 */
	background: #EBEBEB; /* 背景顏色將會針對欄的內容長度而顯示，但僅止於此 */
	padding: 15px 0; /* 頂端和底部欄位間隔會在這個 Div 內部建立視覺空間 */
}
.thrColLiqHdr #sidebar2 {
	float: right; /* 在來源順序中，這個元素必須位於想要相鄰的任何元素前面 */
	width: 23%; /* 因為這個元素是浮動元素，所以您必須指定寬度 */
	background: #EBEBEB; /* 背景顏色將會針對欄的內容長度而顯示，但僅止於此 */
	padding: 15px 0; /* 頂端和底部欄位間隔會在這個 Div 內部建立視覺空間 */
}
.thrColLiqHdr #sidebar1 p, .thrColLiqHdr #sidebar1 h3, .thrColLiqHdr #sidebar2 p, .thrColLiqHdr #sidebar2 h3 {
	margin-left: 10px; /* 您應該針對將要放置於側邊欄的每個元素，指定左和右邊界 */
	margin-right: 10px;
}

/* mainContent 的提示：
1. mainContent 和邊列之間的空間是以 mainContent Div 的左和右邊界所建立。
2. 若要避免在支援的 800 x 600 最小解析度上出現浮動遺失，mainContent Div 中的元素應該是 300px 或更小 (包括影像)。
3. 在下列 Internet Explorer 條件註解中，縮放屬性是用來提供 mainContent "hasLayout"。這樣做可避免許多 IE 特有錯誤。
*/
.thrColLiqHdr #mainContent { 
	margin: 0 24% 0 23.5%; /* 這個 Div 元素的右和左邊界會在頁面的側邊建立兩個外部欄。不論邊列 Div 包含多少內容，欄空間將維持不變。當邊列的內容結束時，如果您想讓 #mainContent Div 的文字填滿邊列的空間，就可以移除這個邊界。*/
}

.thrColLiqHdr #footer { 
	padding: 0 10px; /* 這個欄位間隔符合上面顯示的 Div 中，元素的靠左對齊。 */
	background:#DDDDDD;
} 
.thrColLiqHdr #footer p {
	margin: 0; /* 將頁尾中第一個元素的邊界調整為零可避免邊界收合的可能性 (Div 之間出現的空間) */
	padding: 10px 0; /* 這個元素的欄位間隔將會建立空間，就如同邊界一樣，但是沒有邊界收合的問題 */
}

/* 可重複使用的雜項類別 */
.fltrt { /* 這個類別可用來讓頁面右邊的元素浮動。浮動元素必須位於頁面上必須相鄰的元素前面。 */
	float: right;
	margin-left: 8px;
}
.fltlft { /* 這個類別可用來讓頁面左邊的元素浮動。浮動元素必須位於頁面上必須相鄰的元素前面。 */
	float: left;
	margin-right: 8px;
}
.clearfloat { /* 這個類別應該放置於 Div 或 Break 元素上，而且應該是完整包含子浮動的容器關閉前的最後一個元素 */
	clear:both;
    height:0;
    font-size: 1px;
    line-height: 0px;
}
.style1 {color: #FF0000}
.style2 {color: #0000FF}
.style3 {color: #000000; }
.style4 {
	color: #339966;
}
-->

.thrColLiqHdr #mainContent { zoom: 1; padding-top: 15px; }
/* 上面的專用縮放屬性會提供 IE 所需的 hasLayout，以避免許多錯誤 */
